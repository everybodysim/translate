<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chaos Translator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #4f46e5;
            text-align: center;
        }
        .card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #333;
            background-color: #2a2a2a;
            color: #fff;
            box-sizing: border-box;
        }
        .row {
            display: flex;
            gap: 15px;
        }
        .row .form-group {
            flex: 1;
        }
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #4338ca;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        #outputLog {
            background-color: #151515;
            padding: 15px;
            border-radius: 4px;
            min-height: 50px;
            white-space: pre-wrap;
            border-left: 4px solid #4f46e5;
        }
        .status {
            font-style: italic;
            color: #aaa;
            margin-top: 5px;
        }
        .progress-container {
            width: 100%;
            background-color: #2a2a2a;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }
        .progress-bar {
            width: 0%;
            height: 16px;
            background-color: #10b981;
            transition: width 0.2s ease;
        }
    </style>
</head>
<body>

    <h1>Chaos Translator</h1>

    <div class="card">
        <div class="form-group">
            <label for="inputText">Input Text / Word:</label>
            <input type="text" id="inputText" placeholder="Type something to corrupt...">
        </div>

        <div class="row">
            <div class="form-group">
                <label for="iterations">Translation Steps:</label>
                <input type="number" id="iterations" value="25" min="1" max="100">
            </div>
            <div class="form-group">
                <label for="wordChance">Word Chaos Chance (%):</label>
                <input type="number" id="wordChance" value="15" min="0" max="100">
            </div>
        </div>

        <div class="form-group toggle-container">
            <input type="checkbox" id="improvedOutput" checked>
            <label for="improvedOutput">Enable "Improved Output" (Inject Random Words)</label>
        </div>

        <button id="translateBtn" onclick="startChaos()">Translate into Chaos</button>
    </div>

    <div class="card">
        <h2>Result <span id="percentText" style="font-size: 14px; color: #aaa; float: right;">0%</span></h2>
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div id="status" class="status">Waiting for input...</div>
        <div id="outputLog">Your chaotic result will appear here...</div>
    </div>

    <script>
        const languages = [
            'en', 'es', 'fr', 'de', 'it', 'ja', 'ko', 'zh-CN', 'ru', 'ar', 
            'pt', 'hi', 'nl', 'pl', 'tr', 'sv', 'vi', 'el', 'he', 'th',
            'fi', 'no', 'cs', 'uk', 'id', 'ms', 'ro', 'hu', 'da', 'fa'
        ];

        async function fetchLiveDictionaryWords(count) {
            const response = await fetch(`https://random-word-api.herokuapp.com/word?number=${count}`);
            if (!response.ok) throw new Error("Dictionary Down");
            return await response.json();
        }

        async function translateText(text, fromLang, toLang) {
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${fromLang}&tl=${toLang}&dt=t&q=${encodeURIComponent(text)}`;
                const response = await fetch(url);
                if (!response.ok) throw new Error("API Limit");
                const data = await response.json();
                return data[0].map(item => item[0]).join('');
            } catch (err) {
                console.error(err);
                return text; 
            }
        }

        function injectChaosMidStream(text, chance, dictionaryPool) {
            if (!dictionaryPool || dictionaryPool.length === 0) return text;
            let words = text.split(/\s+/).filter(w => w.length > 0);
            if (words.length === 0) return text;

            if (Math.random() * 100 < chance) {
                const randomWord = dictionaryPool[Math.floor(Math.random() * dictionaryPool.length)];
                const targetIndex = Math.floor(Math.random() * words.length);
                
                if (Math.random() < 0.5) {
                    words[targetIndex] = randomWord; 
                } else {
                    words.splice(targetIndex, 0, randomWord); 
                }
            }
            return words.join(" ");
        }

        async function startChaos() {
            const input = document.getElementById('inputText').value.trim();
            const iterations = parseInt(document.getElementById('iterations').value) || 25;
            const wordChance = parseInt(document.getElementById('wordChance').value) || 0;
            const useChaos = document.getElementById('improvedOutput').checked;
            
            const btn = document.getElementById('translateBtn');
            const statusDiv = document.getElementById('status');
            const outputDiv = document.getElementById('outputLog');
            const pBar = document.getElementById('progressBar');
            const percentText = document.getElementById('percentText');

            if (!input) {
                alert("Please enter some text first!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processing Chaos...";
            statusDiv.innerText = "Connecting to dictionary API...";
            pBar.style.width = "0%";
            percentText.innerText = "0%";

            let dynamicDictionary = [];
            if (useChaos) {
                try {
                    dynamicDictionary = await fetchLiveDictionaryWords(40);
                } catch (e) {
                    alert("Error: Failed to fetch random words from the online dictionary. Please disable the 'Improved Output' feature to continue, or check your internet/CORS settings.");
                    btn.disabled = false;
                    btn.innerText = "Translate into Chaos";
                    statusDiv.innerText = "Failed to fetch dictionary.";
                    pBar.style.width = "100%";
                    percentText.innerText = "100%";
                    return;
                }
            }

            const sentences = input.match(/[^.!?]+[.!?]?/g) || [input];
            const totalSteps = sentences.length * (iterations + 1); 
            let completedSteps = 0;

            function updateProgress() {
                completedSteps++;
                const percentage = Math.min(Math.floor((completedSteps / totalSteps) * 100), 100);
                pBar.style.width = `${percentage}%`;
                percentText.innerText = `${percentage}%`;
            }

            statusDiv.innerText = "Running multi-language transitions...";

            async function processSentenceChain(sentence) {
                let currentText = sentence.trim();
                let currentLang = 'auto';

                for (let i = 0; i < iterations; i++) {
                    let targetLang = languages[Math.floor(Math.random() * languages.length)];
                    currentText = await translateText(currentText, currentLang, targetLang);
                    
                    if (useChaos && dynamicDictionary.length > 0) {
                        currentText = injectChaosMidStream(currentText, wordChance, dynamicDictionary);
                    }
                    
                    currentLang = targetLang;
                    updateProgress();
                }
                
                let finalResult = await translateText(currentText, currentLang, 'en');
                updateProgress();
                return finalResult;
            }

            try {
                const chaoticResults = await Promise.all(sentences.map(s => processSentenceChain(s)));
                outputDiv.innerText = chaoticResults.join(" ");
                statusDiv.innerText = "Done!";
            } catch (error) {
                statusDiv.innerText = "Error processing translation.";
                console.error(error);
            }

            btn.disabled = false;
            btn.innerText = "Translate into Chaos";
        }
    </script>
</body>
</html>
